<div class="min-h-screen flex flex-col relative bg-peach-4 overflow-x-hidden">

  <!-- NAVBAR -->
  <nav class="flex justify-between items-center px-8 md:px-16 py-6 relative z-10">

    <div class="text-2xl font-black text-peach-7 leading-tight tracking-tighter">
      Little<br>SCO
    </div>

    <ul class="hidden md:flex space-x-10 text-sm font-bold text-peach-7">

      <li class="text-peach-1 relative">
        Home

        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 flex space-x-1">
          <span class="w-1 h-2 bg-peach-1 rounded-full rotate-45"></span>
          <span class="w-1 h-2 bg-peach-1 rounded-full -rotate-45"></span>
        </span>
      </li>

      <li class="cursor-pointer hover:text-peach-1 transition">
        Shop
      </li>

      <li class="cursor-pointer hover:text-peach-1 transition">
        New Arrival
      </li>

      <li class="cursor-pointer hover:text-peach-1 transition">
        Category
      </li>

      <li class="cursor-pointer hover:text-peach-1 transition">
        About
      </li>

    </ul>

    <div class="flex space-x-6 text-peach-7">

      <!-- Search -->
      <svg class="w-5 h-5 cursor-pointer"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z">
        </path>
      </svg>

      <!-- Bell -->
      <svg class="w-5 h-5 cursor-pointer"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
        </path>
      </svg>

      <!-- User -->
      <svg class="w-5 h-5 cursor-pointer"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
        </path>
      </svg>

    </div>

  </nav>

  <!-- HERO -->
  <main class="flex-grow flex flex-col items-center pt-10 px-4 relative z-10">

    <h1 class="text-center text-5xl md:text-7xl lg:text-[5.5rem] font-black text-peach-7 leading-[1.1] relative">

      <span class="italic pr-2 text-peach-1 font-serif">
        Dress
      </span>

      Your Little <br>

      Ones in

      <span class="relative inline-block mx-2">
        <span class="bg-peach-2 text-peach-7 px-6 py-1 rounded-[2rem] inline-block -rotate-2 relative z-10">
          Colorful
        </span>
      </span>

      <br>

      Confidence!

    </h1>

    <!-- BOTTOM SECTION -->
    <div class="w-full max-w-6xl flex flex-col md:flex-row justify-between items-center mt-8 px-4 md:px-8">

      <!-- LEFT -->
      <div class="flex flex-col items-start mb-8 md:mb-0">

        <div class="flex items-center space-x-2">

          <span class="text-3xl font-black text-peach-6">
            907+
          </span>

          <div class="flex -space-x-2">

            <img
              class="w-8 h-8 rounded-full border-2 border-white object-cover"
              src="https://placehold.co/100x100/FADCD9/501B4C?text=F1"
            >

            <img
              class="w-8 h-8 rounded-full border-2 border-white object-cover"
              src="https://placehold.co/100x100/A8E6CF/501B4C?text=F2"
            >

            <img
              class="w-8 h-8 rounded-full border-2 border-white object-cover"
              src="https://placehold.co/100x100/FFD3B6/501B4C?text=F3"
            >

          </div>

        </div>

        <p class="text-lg font-bold text-peach-7 mt-1">
          Families Prefer Us!
        </p>

      </div>

      <!-- CENTER -->
      <div class="flex flex-col items-center text-center max-w-sm mb-8 md:mb-0">

        <p class="text-xs font-bold text-peach-7 mb-4 leading-relaxed">
          Where every clothing sparks imagination allowing
          your child to express themselves!
        </p>

        <button class="bg-peach-1 hover:bg-peach-6 text-white font-bold py-2.5 px-6 rounded-full flex items-center space-x-2 shadow-lg transition">
          <span>Shop Now</span>
        </button>

      </div>

    </div>

  </main>

  <!-- CURVE CARDS -->
  <div class="w-full -mt-24 relative overflow-hidden h-[420px]">

    <div
      #scrollContainer
      (scroll)="onScroll()"
      class="flex w-full h-full overflow-x-auto no-scrollbar snap-x snap-mandatory px-[50vw] items-start pt-4 pb-20 space-x-6 cursor-grab"
    >

      <div
        #scrollItem
        *ngFor="let card of cards"
        class="scroll-item snap-center shrink-0 w-64 h-80 rounded-[2.5rem] overflow-hidden relative shadow-xl transition-transform duration-500 hover:-translate-y-4"
        [style.background]="card.bg"
      >

        <img
          [src]="card.image"
          [alt]="card.alt"
          class="w-full h-full object-cover opacity-90"
        >

      </div>

    </div>

  </div>

</div>

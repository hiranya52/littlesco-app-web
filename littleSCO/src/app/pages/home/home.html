<div class="min-h-screen flex flex-col relative bg-[#FEF8ED] overflow-x-hidden">

  <!-- NAVBAR -->
  <nav class="flex justify-between items-center px-8 md:px-16 py-6 relative z-10">

    <div class="text-2xl font-black text-[#501B4C] leading-tight tracking-tighter">
      Little<br>SCO
    </div>

    <ul class="hidden md:flex space-x-10 text-sm font-bold text-[#501B4C]">
      <li class="text-[#FF674A] relative">
        Home

        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 flex space-x-1">
          <span class="w-1 h-2 bg-[#FF674A] rounded-full rotate-45"></span>
          <span class="w-1 h-2 bg-[#FF674A] rounded-full -rotate-45"></span>
        </span>
      </li>

      <li class="cursor-pointer hover:text-[#FF674A] transition">
        Shop
      </li>

      <li class="cursor-pointer hover:text-[#FF674A] transition">
        New Arrival
      </li>

      <li class="cursor-pointer hover:text-[#FF674A] transition">
        Category
      </li>

      <li class="cursor-pointer hover:text-[#FF674A] transition">
        About
      </li>
    </ul>

    <div class="flex space-x-6 text-[#501B4C]">

      <!-- Search -->
      <svg class="w-5 h-5 cursor-pointer"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z">
        </path>
      </svg>

      <!-- Bell -->
      <svg class="w-5 h-5 cursor-pointer"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
        </path>
      </svg>

      <!-- User -->
      <svg class="w-5 h-5 cursor-pointer"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
        </path>
      </svg>

    </div>
  </nav>

  <!-- HERO -->
  <main class="flex-grow flex flex-col items-center pt-10 px-4 relative z-10">

    <h1 class="text-center text-5xl md:text-7xl lg:text-[5.5rem] font-black text-[#501B4C] leading-[1.1] relative">

      <span class="italic pr-2 text-[#FF674A] font-serif">
        Dress
      </span>

      Your Little <br>

      Ones in

      <span class="relative inline-block mx-2">
        <span class="bg-[#FFC93C] text-[#501B4C] px-6 py-1 rounded-[2rem] inline-block -rotate-2 relative z-10">
          Colorful
        </span>
      </span>

      <br>

      Confidence!

    </h1>

    <!-- BOTTOM SECTION -->
    <div class="w-full max-w-6xl flex flex-col md:flex-row justify-between items-center mt-20 px-4 md:px-8">

      <!-- LEFT -->
      <div class="flex flex-col items-start mb-8 md:mb-0">

        <div class="flex items-center space-x-2">

          <span class="text-3xl font-black text-[#FF674A]">
            907+
          </span>

          <div class="flex -space-x-2">
            <img class="w-8 h-8 rounded-full border-2 border-white object-cover"
                 src="https://placehold.co/100x100/FADCD9/501B4C?text=F1">

            <img class="w-8 h-8 rounded-full border-2 border-white object-cover"
                 src="https://placehold.co/100x100/A8E6CF/501B4C?text=F2">

            <img class="w-8 h-8 rounded-full border-2 border-white object-cover"
                 src="https://placehold.co/100x100/FFD3B6/501B4C?text=F3">
          </div>

        </div>

        <p class="text-lg font-bold text-[#501B4C] mt-1">
          Families Prefer Us!
        </p>

      </div>

      <!-- CENTER -->
      <div class="flex flex-col items-center text-center max-w-sm mb-8 md:mb-0">

        <p class="text-xs font-bold text-[#501B4C] mb-4 leading-relaxed">
          Where every clothing sparks imagination allowing
          your child to express themselves!
        </p>

        <button class="bg-[#FF674A] text-white font-bold py-2.5 px-6 rounded-full flex items-center space-x-2 shadow-lg">
          <span>Shop Now</span>
        </button>

      </div>

    </div>
  </main>

  <!-- CURVE CARDS -->
  <div class="w-full mt-10 relative overflow-hidden h-[400px]">

    <div
      #scrollContainer
      (scroll)="onScroll()"
      class="flex w-full h-full overflow-x-auto no-scrollbar snap-x snap-mandatory px-[50vw] items-start pt-10 pb-20 space-x-6 cursor-grab"
    >

      <div
        #scrollItem
        *ngFor="let card of cards"
        class="scroll-item snap-center shrink-0 w-64 h-80 rounded-[2rem] overflow-hidden relative shadow-md"
        [style.background]="card.bg"
      >

        <img
          [src]="card.image"
          [alt]="card.alt"
          class="w-full h-full object-cover opacity-80"
        >

      </div>

    </div>

  </div>

</div>
